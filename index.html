<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Зарики — счёт для игры в 1000 на кубиках</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#15181C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Зарики">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Manrope:wght@400;500;600;700;800&family=Caveat:wght@600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<style>
:root{
  --graphite:#15181C; --graphite-2:#1B1F24; --slate:#23282F; --slate-2:#2C323A;
  --line:#363D46; --line-soft:#2A3038;
  --bone:#ECE7DD; --bone-dim:#A9B0AC; --bone-faint:#6E767A;
  --felt:#1E6F4E; --felt-deep:#175A40; --felt-glow:rgba(46,168,116,.16);
  --brass:#E0A23B; --brass-deep:#B97E22; --brass-glow:rgba(224,162,59,.16);
  --red:#D8533D; --red-glow:rgba(216,83,61,.15);
  --gold:#F2C75A;
  --shadow:0 18px 40px -18px rgba(0,0,0,.65);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(46,168,116,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(224,162,59,.07), transparent 55%),
    var(--graphite);
  color:var(--bone);
  font-family:'Manrope',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  min-height:100vh; min-height:100dvh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.num{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.chalk{font-family:'Caveat',cursive}
.brand{font-family:'Unbounded',sans-serif}

#root{max-width:980px;margin:0 auto;padding:0 16px calc(96px + env(safe-area-inset-bottom)) 16px}

/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;gap:12px;padding:18px 2px 14px;position:sticky;top:0;z-index:20;
  background:linear-gradient(var(--graphite) 72%,transparent)}
.logo{display:flex;align-items:center;gap:11px}
.logo .die{width:38px;height:38px;border-radius:10px;background:var(--bone);position:relative;box-shadow:inset 0 -3px 0 rgba(0,0,0,.12),0 6px 16px -6px rgba(0,0,0,.5);transform:rotate(-6deg)}
.logo .die i{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--graphite)}
.logo h1{font-size:22px;margin:0;letter-spacing:-.01em}
.logo h1 b{color:var(--gold)}
.logo .sub{font-size:11px;color:var(--bone-faint);letter-spacing:.14em;text-transform:uppercase;margin-top:1px}

/* ---------- nav (bottom on mobile) ---------- */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;justify-content:center;
  padding:8px 12px calc(8px + env(safe-area-inset-bottom));
  background:linear-gradient(transparent,var(--graphite) 38%)}
.nav-inner{display:flex;gap:6px;background:var(--graphite-2);border:1px solid var(--line);
  border-radius:18px;padding:6px;box-shadow:var(--shadow)}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 18px;border-radius:13px;
  color:var(--bone-dim);font-size:11px;font-weight:700;letter-spacing:.02em;transition:.18s}
.nav button .ic{font-size:18px;line-height:1}
.nav button.on{background:var(--slate);color:var(--bone)}
.nav button.on .ic{filter:drop-shadow(0 0 8px var(--felt-glow))}

/* ---------- buttons / chips ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:14px;
  padding:13px 18px;font-weight:700;font-size:15px;transition:.15s;border:1px solid transparent}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(180deg,#2EA874,var(--felt));color:#fff;
  box-shadow:0 10px 24px -10px var(--felt),inset 0 1px 0 rgba(255,255,255,.18)}
.btn-ghost{background:var(--slate);border-color:var(--line);color:var(--bone)}
.btn-ghost:active{background:var(--slate-2)}
.btn-brass{background:linear-gradient(180deg,var(--brass),var(--brass-deep));color:#241a07;
  box-shadow:0 10px 24px -12px var(--brass)}
.btn-danger{background:transparent;border-color:rgba(216,83,61,.45);color:var(--red)}
.btn-block{width:100%}
.btn-sm{padding:9px 13px;font-size:13px;border-radius:11px}

.chip{padding:9px 14px;border-radius:11px;background:var(--slate);border:1px solid var(--line);
  color:var(--bone-dim);font-weight:700;font-size:13px;transition:.15s}
.chip.on{background:var(--felt-deep);border-color:#2EA874;color:#eafff4;box-shadow:0 0 0 1px var(--felt-glow)}
.chip:active{transform:translateY(1px)}

.card{background:linear-gradient(180deg,var(--graphite-2),var(--graphite-2));
  border:1px solid var(--line-soft);border-radius:20px;padding:18px;box-shadow:var(--shadow)}

.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--bone-faint);font-weight:700}
.h-sec{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-faint);font-weight:800;margin:26px 2px 12px}

/* ---------- home ---------- */
.hero{padding:14px 4px 6px}
.hero h2{font-size:clamp(26px,7vw,40px);line-height:1.02;margin:6px 0 8px;letter-spacing:-.02em}
.hero h2 em{font-style:normal;color:var(--gold)}
.hero p{color:var(--bone-dim);max-width:48ch;margin:0 0 18px;font-size:15px;line-height:1.5}

.game-card{display:flex;align-items:center;gap:8px;width:100%;margin-bottom:10px;padding:12px 12px 12px 14px}
.game-open{display:flex;align-items:center;gap:14px;flex:1;min-width:0;text-align:left;background:transparent}
.icon-btn.del{flex:none;color:var(--bone-faint)}
.icon-btn.del:active{background:var(--red-glow);border-color:rgba(216,83,61,.5);color:var(--red)}
.game-card .meta{flex:1;min-width:0}
.game-card .title{font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px}
.game-card .who{color:var(--bone-dim);font-size:13px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-card .lead{color:var(--gold);font-weight:800}
.badge{font-size:11px;font-weight:800;letter-spacing:.04em;padding:4px 9px;border-radius:8px}
.badge.live{background:var(--felt-deep);color:#cdfbe4}
.badge.done{background:var(--slate);color:var(--bone-dim)}
.badge.barrel{background:var(--brass-deep);color:#fff2db}

.empty{text-align:center;padding:46px 18px;color:var(--bone-dim)}
.empty .big{font-size:48px;margin-bottom:10px;opacity:.7}

/* ---------- players editor ---------- */
.player-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:13px;
  background:var(--slate);border:1px solid var(--line);margin-bottom:8px}
.player-row .pip{width:30px;height:30px;border-radius:8px;background:var(--bone);color:var(--graphite);
  display:grid;place-items:center;font-weight:800;flex:none;font-size:14px}
.player-row .nm{flex:1;font-weight:700}
.icon-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--bone-dim);
  background:transparent;border:1px solid var(--line);font-size:16px}
.icon-btn:active{background:var(--slate-2)}

/* ---------- rules picker ---------- */
.rule-block{margin-bottom:14px}
.rule-block .lab{font-weight:800;font-size:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.rule-block .hint{font-weight:500;color:var(--bone-faint);font-size:12px}
.opts{display:flex;flex-wrap:wrap;gap:8px}

/* ---------- scoreboard ---------- */
.board-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:4px 0 14px}
.board-head .t{font-size:20px;font-weight:800;letter-spacing:-.01em}
.turn-banner{display:flex;align-items:center;gap:10px;background:var(--graphite-2);border:1px solid var(--line-soft);
  border-radius:14px;padding:10px 14px;margin-bottom:14px}
.turn-banner .dot{width:9px;height:9px;border-radius:50%;background:#2EA874;box-shadow:0 0 0 4px var(--felt-glow)}
.turn-banner b{color:var(--bone)}

.table-wrap{overflow-x:auto;border:1px solid var(--line-soft);border-radius:18px;background:var(--graphite-2)}
table.score{border-collapse:collapse;width:100%;min-width:min(100%,520px)}
table.score th,table.score td{padding:0;text-align:center}
table.score thead th{position:sticky;top:0;background:var(--graphite-2);padding:12px 8px 10px;
  border-bottom:1px solid var(--line);z-index:2}
.ph{display:flex;flex-direction:column;align-items:center;gap:5px}
.ph .av{width:30px;height:30px;border-radius:8px;background:var(--bone);color:var(--graphite);display:grid;place-items:center;font-weight:800;font-size:13px}
.ph .nm{font-weight:800;font-size:13px;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph.lead .av{background:var(--gold);box-shadow:0 0 0 3px rgba(242,199,90,.18)}
.col-idx{width:34px}
.idx{color:var(--bone-faint);font-weight:700;font-size:12px;padding:0 4px}

td.cell{border-bottom:1px solid var(--line-soft);border-left:1px solid var(--line-soft)}
.cell-btn{width:100%;height:46px;display:grid;place-items:center;font-size:16px;font-weight:700;color:var(--bone);transition:.12s}
.cell-btn:active{background:var(--slate)}
.cell-btn.empty{color:var(--bone-faint);font-weight:500}
.cell-btn.bust{color:var(--red)}
.cell-btn.bust::after{content:'самосвал';position:absolute}
.bust-tag{font-size:9px;color:var(--red);letter-spacing:.05em;margin-top:-3px}
.cell-btn.dump{color:var(--brass);font-weight:800}
.dump-tag{font-size:9px;color:var(--brass);letter-spacing:.05em;margin-top:-3px}

tr.pit-line td{border-bottom:2px dashed rgba(224,162,59,.4)}
.pit-flag{font-size:10px;color:var(--brass);font-weight:800;letter-spacing:.06em;padding:3px 0}

tfoot td{border-top:2px solid var(--line);padding:12px 6px 6px}
.total{font-size:22px;font-weight:800;color:var(--bone)}
.total.lead{color:var(--gold)}
.status{font-size:11px;font-weight:800;margin-top:4px;letter-spacing:.03em;min-height:14px}
.status.barrel{color:var(--brass)}
.status.win{color:#3fd99a}
.status.pit{color:var(--brass)}
.barrel-cell{box-shadow:inset 0 0 0 2px rgba(224,162,59,.5),inset 0 18px 30px -22px var(--brass)}

.board-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.kon-del{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;margin:0 auto;
  background:var(--red-glow);border:1px solid rgba(216,83,61,.45);color:var(--red);font-size:13px;font-weight:800}
.kon-del:active{background:var(--red);color:#fff}

/* barrel callout */
.barrel-callout{display:flex;align-items:center;gap:12px;background:linear-gradient(100deg,rgba(224,162,59,.14),rgba(224,162,59,.04));
  border:1px solid rgba(224,162,59,.35);border-radius:16px;padding:12px 16px;margin:14px 0}
.barrel-callout .keg{font-size:26px}
.barrel-callout .txt{flex:1}
.barrel-callout .txt .a{font-weight:800;color:var(--brass)}
.barrel-callout .big{font-size:30px;color:var(--gold)}

/* ---------- modal ---------- */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(8,10,12,.66);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes rise{from{transform:translateY(28px);opacity:.4}to{transform:translateY(0);opacity:1}}
.sheet{width:100%;max-width:560px;background:var(--graphite-2);border:1px solid var(--line);
  border-radius:24px 24px 0 0;padding:14px 14px calc(16px + env(safe-area-inset-bottom));
  box-shadow:0 -20px 60px -20px rgba(0,0,0,.7);animation:rise .2s cubic-bezier(.2,.8,.2,1);max-height:92vh;max-height:92dvh;
  display:flex;flex-direction:column}
@media(min-width:620px){.scrim{align-items:center}.sheet{border-radius:24px}}
.grip{width:42px;height:5px;border-radius:3px;background:var(--line);margin:2px auto 12px;flex:none}
.sheet-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex:none}
.sheet-head .lbl{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-faint);font-weight:800}
.entry{flex:1;min-width:0;background:var(--graphite);border:1px solid var(--line);border-radius:14px;
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.entry .val{font-size:30px;font-weight:800}
.entry .val.empty{color:var(--bone-faint)}
.entry .tools{display:flex;gap:8px;flex:none}
.entry .tools button{width:42px;height:42px;border-radius:11px;background:var(--slate);border:1px solid var(--line);
  display:grid;place-items:center;font-size:17px;color:var(--bone)}
.entry .tools button:active{background:var(--slate-2)}

.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:14px}
.pad button{height:60px;border-radius:14px;background:var(--slate);border:1px solid var(--line);
  font-size:23px;font-weight:700;color:var(--bone);transition:.1s}
.pad button:active{background:var(--felt-deep);border-color:#2EA874}
.pad button.util{background:var(--graphite);font-size:17px;color:var(--bone-dim)}
.pad button.zero{grid-column:span 1}

.quick{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.quick button{padding:9px 13px;border-radius:11px;background:var(--graphite);border:1px solid var(--line);
  font-weight:700;font-size:14px;color:var(--bone-dim)}
.quick button:active{background:var(--slate)}
.quick button.bust{color:var(--red);border-color:rgba(216,83,61,.4)}

/* keyboard */
.kb{display:flex;flex-direction:column;gap:7px;margin-top:14px;overflow:auto}
.kb-row{display:flex;gap:6px;justify-content:center}
.kb button{flex:1;min-width:0;height:46px;border-radius:10px;background:var(--slate);border:1px solid var(--line);
  font-size:16px;font-weight:600;color:var(--bone);transition:.08s}
.kb button:active{background:var(--felt-deep)}
.kb button.wide{flex:1.6}
.kb button.util{background:var(--graphite);color:var(--bone-dim);font-size:13px;font-weight:700}
.kb-tabs{display:flex;gap:6px;margin-top:10px}
.kb-tabs button{flex:1;padding:8px;border-radius:10px;background:var(--graphite);border:1px solid var(--line);
  font-weight:800;font-size:12px;color:var(--bone-dim)}
.kb-tabs button.on{background:var(--slate);color:var(--bone)}

.sheet-foot{display:flex;gap:10px;margin-top:14px;flex:none}

/* ---------- rules page ---------- */
.prose h3{font-size:16px;margin:22px 0 8px;color:var(--bone)}
.prose p{color:var(--bone-dim);line-height:1.6;margin:8px 0;font-size:14px}
.prose .tag{color:var(--gold);font-weight:700}
.rtable{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px}
.rtable td{padding:9px 10px;border-bottom:1px solid var(--line-soft)}
.rtable td:last-child{text-align:right;font-weight:800;color:var(--bone)}
.active-rules{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 4px}

/* ---------- stats ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:8px}
.stat{background:var(--graphite-2);border:1px solid var(--line-soft);border-radius:16px;padding:14px}
.stat .n{font-size:30px;font-weight:800}
.stat .l{font-size:12px;color:var(--bone-faint);font-weight:700;margin-top:2px;letter-spacing:.02em}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line-soft)}
.lb-row .rk{width:24px;color:var(--bone-faint);font-weight:800;text-align:center}
.lb-row .nm{flex:1;font-weight:700}
.lb-row .vals{display:flex;gap:14px;font-size:13px;color:var(--bone-dim)}
.lb-row .vals b{color:var(--bone)}

.subnav{display:flex;gap:8px;margin:2px 0 16px}
.toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%);
  background:var(--slate);border:1px solid var(--line);border-radius:12px;padding:11px 18px;font-weight:700;
  font-size:14px;z-index:60;box-shadow:var(--shadow);animation:rise .2s}
.back{display:inline-flex;align-items:center;gap:7px;color:var(--bone-dim);font-weight:700;font-size:14px;
  padding:8px 2px;margin:2px 0 6px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ============================== storage ============================== */
// localStorage with safe in-memory fallback (so it also runs in sandboxes)
const mem = {};
const store = (() => {
  let ok = false;
  try { const k='__z'; localStorage.setItem(k,'1'); localStorage.removeItem(k); ok=true; } catch(e){ ok=false; }
  return {
    get(k){ try{ return ok ? localStorage.getItem(k) : (mem[k] ?? null);}catch(e){return mem[k]??null;} },
    set(k,v){ try{ ok ? localStorage.setItem(k,v) : (mem[k]=v);}catch(e){mem[k]=v;} },
  };
})();
const DB_KEY = '1kzariki:db:v1';
const loadDB = () => { try { return JSON.parse(store.get(DB_KEY)) || {games:[]}; } catch(e){ return {games:[]}; } };
const saveDB = (db) => store.set(DB_KEY, JSON.stringify(db));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

/* ============================== rules ============================== */
const DEFAULT_RULES = {
  target:1000, barrelAt:880, scale:'classic',
  exact:true, pitLines:[300,700], samosval:0, bolt3:-100, dump555:3, overtake:-50, entry:120, entryMode:'once', confirm:true,
};
const PRESETS = {
  'Классика':   { target:1000, barrelAt:880, scale:'classic', exact:true,  pitLines:[300,700], samosval:0,    bolt3:-100, dump555:3,       overtake:-50,  entry:120, entryMode:'once', confirm:true },
  'Дворовая':   { target:1000, barrelAt:850, scale:'classic', exact:true,  pitLines:[300,700], samosval:0,    bolt3:-100, dump555:'always',overtake:-100, entry:120, entryMode:'each', confirm:true },
  'Быстрая':    { target:1000, barrelAt:880, scale:'fast',    exact:false, pitLines:[],         samosval:0,    bolt3:0,    dump555:'off',   overtake:0,    entry:0,   entryMode:'once', confirm:false },
  'Без бочки':  { target:1000, barrelAt:1000,scale:'classic', exact:false, pitLines:[],         samosval:0,    bolt3:0,    dump555:'off',   overtake:-50,  entry:0,   entryMode:'once', confirm:false },
};
const QUICK = { classic:[5,10,15,20,25,30,40,50,100,125,250], fast:[50,100,150,200,250,300,500] };
const PIT_LINES = [300,700]; // дефолтные ямы: диапазоны 200–300 и 600–700

/* ============================== game math ============================== */
function totalsFor(game){
  // chronological simulator: entry gate + per-bolt + 3-bolt + overtake + самосвал (счёт ровно 555 → сброс).
  const R = game.rules;
  const threshold = R.entry || 0;
  const reentry = threshold > 0 && R.entryMode === 'each'; // <120 wipes to zero, re-enter each time
  const pitLines = R.pitLines || (R.pits ? PIT_LINES : []);
  const DUMP_AT = 555; // самосвал: счёт ровно 555 очков сбрасывается в ноль
  const out = {};
  const boltRun = {};
  game.players.forEach(p => { out[p.id] = {total:0,busts:0,best:0,penalties:0,opened:false,everBarrel:false,dumps:0,dumpTurns:[]}; boltRun[p.id]=0; });

  game.turns.forEach((t, ti) => {
    game.players.forEach(p => {
      const v = t.scores[p.id];
      if (v === null || v === undefined) return;
      const s = out[p.id];

      if (reentry){
        // every кон must clear the threshold; a smaller one resets you to zero
        if (v >= threshold){
          s.opened = true;
          s.total += v;
          if (v > s.best) s.best = v;
        } else {
          if (v === 0) s.busts++;
          s.total = 0; s.opened = false; boltRun[p.id] = 0;
        }
      } else {
        // entry gate once: until you score >= threshold, nothing is written; once in, stay in
        if (!s.opened){
          if (threshold > 0 && v < threshold) return;
          s.opened = true;
        }
        s.total += v;
        if (v > s.best) s.best = v;
        if (v === 0){
          s.busts++;
          boltRun[p.id]++;
          if (R.samosval){ s.total += R.samosval; s.penalties += (-R.samosval); }
          if (R.bolt3 && boltRun[p.id] >= 3){ s.total += R.bolt3; s.penalties += (-R.bolt3); boltRun[p.id] = 0; }
        } else {
          boltRun[p.id] = 0;
        }
      }

      // --- Самосвал: счёт встал ровно на 555 → сброс в ноль (с лимитом срабатываний) ---
      if (s.total === DUMP_AT){
        const lim = R.dump555;
        const active = lim === 'always' || (typeof lim === 'number' && lim > 0 && s.dumps < lim);
        if (active){ s.total = 0; s.dumps++; s.dumpTurns.push(ti); boltRun[p.id] = 0; }
      }

      if (R.barrelAt < R.target && s.total >= R.barrelAt && s.total < R.target) s.everBarrel = true;
      // overtake: landing exactly on an opponent's total knocks them back
      if (R.overtake){
        game.players.forEach(q => {
          if (q.id === p.id) return;
          const os = out[q.id];
          if (!os.opened || os.total <= 0) return;
          if (os.total === s.total){ os.total += R.overtake; os.penalties += (-R.overtake); }
        });
      }
    });
  });

  game.players.forEach(p => {
    const s = out[p.id];
    s.onBarrel = R.barrelAt < R.target && s.total >= R.barrelAt && s.total < R.target;
    s.remaining = R.target - s.total;
    s.won = R.exact ? s.total === R.target : s.total >= R.target;
    s.over = R.exact && s.total > R.target;
    s.pit = pitLines.length ? pitLines.find(l => s.total >= l - 100 && s.total < l) : null;
    s.needEntry = (threshold > 0 && !s.opened) ? threshold : 0;
  });
  return out;
}
function leaderId(game, tot){
  let id=null, mx=-1;
  game.players.forEach(p => { const t = tot[p.id].total; if (t>mx){mx=t;id=p.id;} });
  return mx>0 ? id : null;
}
function winnerId(game, tot){
  const w = game.players.find(p => tot[p.id].won);
  return w ? w.id : null;
}

/* ============================== stats ============================== */
function aggregate(db){
  const by = {}; // by normalized name
  const norm = n => n.trim().toLowerCase();
  const ensure = n => { const k=norm(n); if(!by[k]) by[k]={name:n,wins:0,games:0,barrels:0,busts:0,best:0,points:0}; return by[k]; };
  let totalGames=0, totalBarrels=0, totalBusts=0;
  db.games.forEach(g => {
    const tot = totalsFor(g);
    const w = winnerId(g, tot);
    g.players.forEach(p => {
      const e = ensure(p.name); e.games++;
      const s = tot[p.id];
      e.busts += s.busts; totalBusts += s.busts;
      if (s.best > e.best) e.best = s.best;
      e.points += s.total;
      if (s.everBarrel){ e.barrels++; totalBarrels++; }
    });
    if (w){ ensure(g.players.find(p=>p.id===w).name).wins++; }
    totalGames++;
  });
  const board = Object.values(by).sort((a,b)=> b.wins-a.wins || b.points-a.points);
  return { board, totalGames, totalBarrels, totalBusts };
}

  const nextPlayer = useMemo(()=>{
    if (win) return null;
    if (!lastRow) return game.players[0];
    const empty = game.players.find(p => lastRow.scores[p.id]===null);
    return empty || game.players[0];
  },[game,win,lastRow]);

    const scores = {}; game.players.forEach(p=>scores[p.id]=null);

    const turns = game.turns.map((t,i)=> i===turnIdx ? {...t,scores:{...t.scores,[playerId]:value}} : t);
    update({...game, turns});
    setEdit(null);

                          onClick={()=>openCell(ti,p.id)} style={{position:'relative'}}>
                          {v===null ? '·'
                            : isBust ? <span>0<div className="bust-tag">болт</div></span>
                            : isDump ? <span className="num">{v}<div className="dump-tag">самосвал</div></span>
                            : <span className="num">{v}</span>}
                        </button>
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr>
              <td className="col-idx"><span className="chalk" style={{fontSize:18,color:'var(--bone-faint)'}}>Σ</span></td>
              {game.players.map(p=>{
                const s = tot[p.id];
                const isLead = lead===p.id;
                return (
                  <td key={p.id} className={s.onBarrel?'barrel-cell':''}>
                    <div className={"total "+(isLead?'lead':'')}>{s.total}</div>
                    <div className={"status "+(s.won?'win':s.needEntry?'barrel':s.onBarrel?'barrel':s.pit?'pit':'')}>
                      {s.won ? '✓ закрыл' : s.over ? 'перебор' : s.needEntry ? '🚪 зайти от '+s.needEntry : s.onBarrel ? '🛢 −'+s.remaining : s.pit ? '🕳 +'+(s.pit-s.total)+' до '+s.pit : ''}
                    </div>
                    {s.penalties>0 && <div className="status" style={{color:'var(--red)'}}>штраф −{s.penalties}</div>}
                  </td>
                );
              })}
            </tr>
          </tfoot>
        </table>
      </div>

      <div className="board-actions">
        <button className="btn btn-primary" onClick={addTurn} disabled={!!win} style={win?{opacity:.45}:{}}>+ Новый кон</button>
        {game.turns.length>0 && (
          <button className={"btn btn-sm "+(editMode?'btn-brass':'btn-ghost')} onClick={()=>setEditMode(m=>!m)}>
            {editMode?'Готово':'Править коны'}
          </button>
        )}
      </div>

      {delTurn!==null && (
        <ConfirmModal title={"Удалить кон "+(delTurn+1)}
          message="Этот кон и очки всех игроков в нём сотрутся. Итоги пересчитаются."
          onClose={()=>setDelTurn(null)}
          onConfirm={()=>deleteTurn(delTurn)}/>
      )}

      {edit && (()=>{
        const v = game.turns[edit.turnIdx].scores[edit.playerId];
        const pl = game.players.find(p=>p.id===edit.playerId);
        return <NumberModal
          title={pl.name + ' · кон ' + (edit.turnIdx+1)}
          initial={v} scale={R.scale} allowBust={true}
          onClose={()=>setEdit(null)}
          onDelete={v!==null ? ()=>setScore(edit.turnIdx, edit.playerId, null) : null}
          onSave={n=>setScore(edit.turnIdx, edit.playerId, n)}
        />;
      })()}
    </div>
  );
}

  );

/* ============================== sync (frontend-only, GitHub Gist) ============================== */
// Облачная синхронизация целиком на фронте: один приватный gist хранит весь DB, токен лежит локально, push/pull по кнопке.
const SyncCfg = {
  get(){ try{return JSON.parse(store.get('1kzariki:sync')||'{}');}catch(e){return {};} },
  set(c){ store.set('1kzariki:sync', JSON.stringify(c)); },
};
async function gistPush(db){
  const c = SyncCfg.get();
  if(!c.token) throw new Error('Нет токена');
  const body = { description:'1kzariki-sync', public:false, files:{ '1kzariki.json':{content:JSON.stringify(db)} } };
  const url = c.gistId ? `https://api.github.com/gists/${c.gistId}` : 'https://api.github.com/gists';
  const r = await fetch(url,{ method:c.gistId?'PATCH':'POST',
    headers:{Authorization:'token '+c.token,'Content-Type':'application/json'}, body:JSON.stringify(body)});
  if(!r.ok) throw new Error('GitHub '+r.status);
  const j = await r.json(); SyncCfg.set({...c, gistId:j.id}); return j.id;
}
async function gistPull(){
  const c = SyncCfg.get();
  if(!c.token||!c.gistId) throw new Error('Нет токена или gist');
  const r = await fetch(`https://api.github.com/gists/${c.gistId}`,{headers:{Authorization:'token '+c.token}});
  if(!r.ok) throw new Error('GitHub '+r.status);
  const j = await r.json(); return JSON.parse(j.files['1kzariki.json'].content);
}

function SyncPanel({db, replaceDB, toast}){
  const c = SyncCfg.get();
  const [token,setToken] = useState(c.token||'');
  const [busy,setBusy] = useState(false);
  const exportFile = () => {
    const blob = new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='1kzariki-backup.json'; a.click();
  };
  const importFile = e => {
    const f = e.target.files[0]; if(!f) return;
    const rd = new FileReader(); rd.onload=()=>{ try{ replaceDB(JSON.parse(rd.result)); toast('Импортировано'); }catch(err){ toast('Битый файл'); } }; rd.readAsText(f);
  };
  const save = ()=>{ SyncCfg.set({...SyncCfg.get(),token:token.trim()}); toast('Токен сохранён'); };
  const push = async ()=>{ setBusy(true); try{ await gistPush(db); toast('Выгружено в облако'); }catch(e){ toast('Ошибка: '+e.message);} setBusy(false); };
  const pull = async ()=>{ setBusy(true); try{ const r=await gistPull(); replaceDB(r); toast('Загружено из облака'); }catch(e){ toast('Ошибка: '+e.message);} setBusy(false); };
  return (
    <div>
      <h2 style={{fontSize:24,margin:'2px 0 6px'}}>Синхронизация</h2>
      <p style={{color:'var(--bone-dim)',fontSize:14,lineHeight:1.5,margin:'0 0 16px'}}>
        Один приватный gist + персональный токен. Всё хранится локально,
        в облако уходит только по кнопке.</p>

      <div className="h-sec" style={{marginTop:0}}>Файл</div>
      <div className="board-actions" style={{marginTop:0}}>
        <button className="btn btn-ghost btn-sm" onClick={exportFile}>↓ Скачать бэкап</button>
        <label className="btn btn-ghost btn-sm">↑ Загрузить бэкап
          <input type="file" accept="application/json" onChange={importFile} style={{display:'none'}}/>
        </label>
      </div>

      <div className="h-sec">Облако (GitHub Gist)</div>
      <div className="card">
        <div className="rule-block">
          <div className="lab"><span>Personal access token</span><span className="hint">scope: gist</span></div>
          <input value={token} onChange={e=>setToken(e.target.value)} placeholder="ghp_…" type="password"
            style={{width:'100%',padding:'12px 14px',borderRadius:12,background:'var(--graphite)',border:'1px solid var(--line)',color:'var(--bone)',fontFamily:'JetBrains Mono'}}/>
        </div>
        <div className="board-actions" style={{marginTop:6}}>
          <button className="btn btn-ghost btn-sm" onClick={save}>Сохранить токен</button>
          <button className="btn btn-brass btn-sm" disabled={busy} onClick={push}>⇧ Выгрузить</button>
          <button className="btn btn-ghost btn-sm" disabled={busy} onClick={pull}>⇩ Загрузить</button>
        </div>
        {c.gistId && <p style={{color:'var(--bone-faint)',fontSize:12,marginTop:10}}>gist: {c.gistId}</p>}
      </div>
    </div>
  );
}

/* ============================== app shell ============================== */
function App(){
  const [db, setDb] = useState(loadDB);
  const [view, setView] = useState({name:'home'});
  const [toastMsg, setToastMsg] = useState(null);
  const toast = m => { setToastMsg(m); setTimeout(()=>setToastMsg(null),1700); };

  useEffect(()=>{ saveDB(db); },[db]);

  const persist = (game) => setDb(d=>({...d, games:d.games.map(g=>g.id===game.id?{...game,updatedAt:Date.now()}:g)}));
  const replaceDB = (newdb)=>{ if(newdb && Array.isArray(newdb.games)){ setDb(newdb); setView({name:'home'}); } };

  const go = (v) => {
    if (v.name==='delete'){ setDb(d=>({...d,games:d.games.filter(g=>g.id!==v.id)})); setView({name:'home'}); toast('Партия удалена'); return; }
    setView(v);
  };
  const createGame = (players, rules) => {
    const g = { id:uid(), name:'Партия '+(db.games.length+1), createdAt:Date.now(), updatedAt:Date.now(),
      players:players.map(p=>({...p})), rules:{...rules},
      turns:[ (()=>{ const s={}; players.forEach(p=>s[p.id]=null); return {id:uid(),scores:s}; })() ] };
    setDb(d=>({...d, games:[...d.games, g]}));
    setView({name:'game', id:g.id});
  };

  const curGame = view.id ? db.games.find(g=>g.id===view.id) : null;
  const tab = ['home','new','game'].includes(view.name) ? 'home' : view.name;

  return (
    <div>
      <div className="topbar">
        <div className="logo">
          <DieLogo/>
          <div>
            <h1 className="brand">За<b>рики</b></h1>
            <div className="sub">1000 на кубиках</div>
          </div>
        </div>
      </div>

      {view.name==='home' && <Home db={db} go={go}/>}
      {view.name==='new' && <NewGame onCreate={createGame} go={go}/>}
      {view.name==='game' && curGame && <GameBoard game={curGame} update={persist} go={go} toast={toast}/>}
      {view.name==='game' && !curGame && <Home db={db} go={go}/>}
      {view.name==='rules' && <RulesPage game={curGame} go={go}/>}
      {view.name==='stats' && <Stats db={db} go={go}/>}
      {view.name==='sync' && <SyncPanel db={db} replaceDB={replaceDB} toast={toast}/>}

      <div className="nav">
        <div className="nav-inner">
          <button className={tab==='home'?'on':''} onClick={()=>go({name:'home'})}><span className="ic">🎲</span>Игры</button>
          <button className={tab==='rules'?'on':''} onClick={()=>go({name:'rules', id:curGame?curGame.id:undefined})}><span className="ic">📜</span>Правила</button>
          <button className={tab==='stats'?'on':''} onClick={()=>go({name:'stats'})}><span className="ic">📊</span>Стата</button>
          <button className={tab==='sync'?'on':''} onClick={()=>go({name:'sync'})}><span className="ic">☁️</span>Синк</button>
        </div>
      </div>

      {toastMsg && <div className="toast">{toastMsg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
